name: Custom GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # Chạy hàng ngày vào lúc 00:00 UTC
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  build:
    name: Update GitHub metrics
    runs-on: ubuntu-latest
    steps:
      # Metrics cho thống kê GitHub
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: YOUR_USERNAME
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_threshold: 2%
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_notable: yes
          plugin_lines: yes
          plugin_projects: yes
          plugin_projects_limit: 4
          
name: WakaTime Weekly Metrics

on:
  schedule:
    - cron: "0 0 * * 0"  # Chạy vào Chủ Nhật lúc 00:00 UTC
  workflow_dispatch:

jobs:
  update-readme:
    name: WakaTime Coding Stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SHOW_TIME: true
          SHOW_MASKED_TIME: true
          TIME_RANGE: last_7_days
          SHOW_TOTAL: true
          BLOCKS: ⣀⣄⣤⣦⣶⣷⣿
          
name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Calendar
    steps:
      - uses: actions/checkout@v2
      - uses: yoshi389111/github-profile-3d-contrib@0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Updated 3D Contrib Calendar"
          git push